name: Build Protobuf Windows ARM64 Wheel (Bazel)

on:
  workflow_dispatch:

jobs:
  build_arm64_wheel:
    name: Build Python 3.14 ARM64 Wheel
    runs-on: windows-2022

    steps:
      - name: Checkout Protobuf Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true

      - name: Build Wheel with Bazel Cross-Compilation
        shell: cmd
        run: |
          :: Set MSVC environment variables for cross-compiling x64 -> ARM64
          :: call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars.bat"
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat"

          ::amd64_arm64

          :: Build the binary wheel using Bazel pointing to target architecture
          
          bazel --batch build -c opt --cpu=arm64 --compiler=msvc-cl //python/dist:binary_wheel --incompatible_use_python_toolchains=true --verbose_failures --sandbox_debug --subcommands

          bazel cquery //python/dist:binary_wheel --output=files

      - name: Upload Generated Wheel
        uses: actions/upload-artifact@v4
        with:
          name: protobuf-windows-arm64-wheel
          path: bazel-bin/python/dist/*.whl
